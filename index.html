<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAISON NORÉ — Join The Movement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .landing-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      padding: var(--space-7);
    }

    .landing-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(196, 90, 50, 0.15), transparent 60%);
      z-index: 0;
    }

    .landing-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      opacity: 0;
      animation: fadeIn 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.5s;
    }

    .landing-title {
      font-family: var(--serif);
      font-size: clamp(60px, 12vw, 160px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.04em;
      margin-bottom: var(--space-6);
    }

    .landing-title em {
      font-style: italic;
      color: var(--rust);
    }

    .landing-desc {
      font-size: 16px;
      color: var(--ink-2);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto var(--space-8);
    }

    .join-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-4);
      padding: 24px 40px;
      background: var(--ink);
      color: var(--bg);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 500;
      border: none;
      cursor: none;
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .join-btn:hover {
      background: var(--rust);
      color: var(--bone);
      padding-right: 56px;
      padding-left: 24px;
    }

    .join-btn-arrow {
      transition: transform 0.5s ease;
    }

    .join-btn:hover .join-btn-arrow {
      transform: translateX(8px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="grain"></div>
  <div class="cursor"></div>
  <div class="cursor-ring"></div>

  <section class="landing-hero">
    <div class="landing-bg"></div>
    <div class="landing-content">
      <div class="hero-eyebrow" style="justify-content: center; opacity: 1; animation: none;">
        <span class="dot"></span>
        MAISON NORÉ
      </div>
      <h1 class="landing-title">
        Quiet<br><em>defiance.</em>
      </h1>
      <p class="landing-desc">Twelve garments forming the spine of a season. Cut in small editions from cloth specified
        in our atelier.</p>
      <a href="main.html" class="join-btn" data-label="Enter">
        <span>Join The Movement</span>
        <span class="join-btn-arrow">[ → ]</span>
      </a>
    </div>
  </section>

  <script>
    const cursor = document.querySelector('.cursor');
    const cursorRing = document.querySelector('.cursor-ring');
    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let ringX = mouseX, ringY = mouseY;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      cursor.style.transform = `translate(${mouseX - 3}px, ${mouseY - 3}px)`;
    });

    (function ring() {
      ringX += (mouseX - ringX) * 0.16;
      ringY += (mouseY - ringY) * 0.16;
      cursorRing.style.transform = `translate(${ringX - 16}px, ${ringY - 16}px)`;
      requestAnimationFrame(ring);
    })();

    document.querySelector('.join-btn').addEventListener('mouseenter', () => {
      cursor.classList.add('expand');
      cursorRing.classList.add('expand');
    });
    document.querySelector('.join-btn').addEventListener('mouseleave', () => {
      cursor.classList.remove('expand');
      cursorRing.classList.remove('expand');
    });
  </script>

</body>

</html>
